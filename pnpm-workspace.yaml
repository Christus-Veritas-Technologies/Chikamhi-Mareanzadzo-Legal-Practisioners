  msgpackr-extract: true
  sharp: true
  "@prisma/engines": true
  prisma: true
catalog:
  dotenv: ^17.2.2
  zod: ^4.1.13
  typescript: ^6
  "@types/bun": ^1.3.4
  lucide-react: ^1.21.0
  next-themes: ^0.4.6
  sonner: ^2.0.7
  "@tailwindcss/postcss": ^4.3.1
  "@types/react-dom": ^19.2.3
  tailwind-merge: ^3.6.0
minimumReleaseAgeExclude:
  - '@expo/config-plugins@56.0.10'
  - '@expo/config-types@56.0.7'
  - expo-image-picker@56.0.19
  - expo-sharing@56.0.19
